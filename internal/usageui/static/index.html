<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discursive Usage</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --danger: #f85149;
  --warn: #d29922;
  --moonshot: #7c3aed;
  --moonshot-light: #a78bfa;
  --deepseek: #2563eb;
  --deepseek-light: #60a5fa;
  --thaura: #059669;
  --thaura-light: #34d399;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 24px; max-width: 1100px; margin: 0 auto; }
.header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.header img { height: 32px; width: auto; }
.header .providers { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.header .provider-indicator { display: flex; align-items: center; gap: 6px; opacity: 0.4; transition: opacity 0.2s; }
.header .provider-indicator.enabled { opacity: 1; }
.header .provider-indicator img { height: 22px; width: auto; }
.header .provider-indicator .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
h2 { font-size: 1.1rem; color: var(--text-muted); font-weight: 500; }
.time-select { font-size: 0.8rem; padding: 4px 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; }
.time-select:focus { outline: none; border-color: var(--accent); }
.dropdown-label { font-size: 0.78rem; color: var(--text-muted); margin-right: 4px; }
.dropdown-group { display: flex; align-items: center; gap: 8px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; }
.period-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 12px; }
.period-summary .stat { text-align: center; }
.period-summary .label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.period-summary .value { font-size: 1.05rem; font-weight: 600; margin-top: 2px; }
.stat { text-align: center; }
.stat .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.stat .value { font-size: 1.6rem; font-weight: 600; margin-top: 4px; }
.stat .sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
.charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; }
.chart-box { height: 260px; position: relative; }
.chart-legend { display: flex; align-items: center; gap: 16px; margin-bottom: 4px; }
.chart-legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: var(--text-muted); }
.chart-legend-swatch { width: 10px; height: 10px; border-radius: 2px; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
th { color: var(--text-muted); font-weight: 500; }
td { color: var(--text); }
tr:hover td { background: rgba(255,255,255,0.02); }
.session-row { cursor: pointer; }
.session-row:hover td { background: rgba(88,166,255,0.05); }
.health-grid { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 0; }
.health-col { padding: 12px 12px; border-bottom: 1px solid var(--border); }
.health-col:nth-child(n+4) { border-bottom: none; }
.health-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.health-val { font-size: 0.85rem; color: var(--text); word-break: break-all; }
.health-sub { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
.health-btn { font-size: 0.72rem; padding: 3px 12px; border-radius: 5px; border: 1px solid var(--border); background: rgba(48,54,61,0.6); color: var(--text-muted); cursor: pointer; white-space: nowrap; font-weight: 500; letter-spacing: 0.2px; transition: all 0.15s; min-height: 28px; line-height: 1.4; }
.health-btn:hover { background: rgba(88,166,255,0.12); border-color: rgba(88,166,255,0.3); color: var(--accent); }
.health-btn:active { background: rgba(88,166,255,0.18); }
.health-btn.copy-btn { color: var(--accent2); border-color: rgba(63,185,80,0.25); background: rgba(63,185,80,0.08); }
.health-btn.copy-btn:hover { background: rgba(63,185,80,0.16); border-color: rgba(63,185,80,0.45); }
.health-btn.copied-flash { color: var(--accent2) !important; border-color: var(--accent2) !important; background: rgba(63,185,80,0.2) !important; }
.gw-key-blur { color: transparent; text-shadow: 0 0 6px var(--text-muted); user-select: none; cursor: default; }
.gw-key-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.dot-ok { background: var(--accent2); }
.dot-warn { background: var(--warn); }
.dot-err { background: var(--danger); }
.loading { color: var(--text-muted); padding: 40px; text-align: center; }
.error { color: #f85149; padding: 16px; }
.moonshot { color: var(--moonshot); }
.deepseek { color: var(--deepseek); }
.thaura { color: var(--thaura); }
.usd { font-variant-numeric: tabular-nums; text-align: right !important; min-width: 90px; }
.num { font-variant-numeric: tabular-nums; text-align: right !important; }
.stats-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 0.78rem; color: var(--text-muted); }
.retention-info { position: relative; display: inline-flex; align-items: center; cursor: help; }
.retention-info .icon { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--text-muted); line-height: 1; }
.retention-info .tooltip { display: none; position: absolute; top: 50%; left: calc(100% + 8px); transform: translateY(-50%); background: #21262d; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 0.72rem; color: var(--text); white-space: nowrap; z-index: 10; line-height: 1.5; }
.retention-info .tooltip::after { content: ''; position: absolute; top: 50%; right: 100%; transform: translateY(-50%); border: 5px solid transparent; border-right-color: var(--border); }
.retention-info:hover .tooltip { display: block; }
.sessions-info { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--text-muted); line-height: 1; cursor: help; flex-shrink: 0; position: relative; }
.sessions-info::after { content: attr(data-tip); display: none; position: absolute; top: 50%; right: calc(100% + 8px); transform: translateY(-50%); background: #21262d; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 0.72rem; color: var(--text); white-space: nowrap; z-index: 10; line-height: 1.5; }
.sessions-info:hover::after { display: block; }
.pricing-tip { display: none; position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #21262d; border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-size: 0.72rem; color: var(--text); white-space: nowrap; z-index: 10; line-height: 1.6; font-weight: normal; }
.pricing-tip > div { pointer-events: none; }
.provider-indicator a:hover .pricing-tip { display: block; }
.fx-info { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--text-muted); line-height: 1; cursor: help; margin-right: 2px; flex-shrink: 0; position: relative; }
.fx-info::after { content: attr(data-tip); display: none; position: absolute; top: 50%; left: calc(100% + 8px); transform: translateY(-50%); background: #21262d; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 0.72rem; color: var(--text); white-space: nowrap; z-index: 10; line-height: 1.5; }
.fx-info:hover::after { display: block; }

.health-info { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--text-muted); line-height: 1; cursor: help; flex-shrink: 0; position: relative; margin-left: 4px; vertical-align: text-bottom; }
.health-info::after { content: attr(data-tip); display: none; position: absolute; top: 50%; left: calc(100% + 8px); transform: translateY(-50%); background: #21262d; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 0.72rem; color: var(--text); white-space: normal; z-index: 10; line-height: 1.5; max-width: 320px; text-align: left; text-transform: none; letter-spacing: normal; }
.health-info:hover::after { display: block; }
.health-link { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-size: 0.45rem; color: var(--text-muted); line-height: 1; cursor: pointer; flex-shrink: 0; text-decoration: none; margin-left: 4px; vertical-align: text-bottom; transition: all 0.15s; }
.health-link:hover { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.1); }
#custom-tooltip { display: none; position: fixed; z-index: 100; background: #1a1f2b; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 0.78rem; color: var(--text); pointer-events: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; box-shadow: 0 4px 16px rgba(0,0,0,0.5); line-height: 1.6; }
#custom-tooltip .tt-title { font-weight: 600; font-size: 0.82rem; margin-bottom: 4px; color: var(--text); }
#custom-tooltip .tt-logo-row { margin-bottom: 6px; }
#custom-tooltip .tt-logo-row img { width: 160px !important; height: auto !important; }
#custom-tooltip .tt-row { padding-left: 0; }
#custom-tooltip .tt-total { margin-top: 4px; padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); }
</style>
</head>
<body>
<div class="header">
  <img src="/static/discursive.png" alt="Discursive">
  <div class="providers" id="provider-indicators"></div>
</div>

<div class="card" id="health-card">
  <h2>💚 System Health</h2>
  <div class="loading" id="health-loading">Loading...</div>
  <div class="health-grid" id="health-grid" style="display:none"></div>
  <div class="error" id="health-error" style="display:none"></div>
</div>

<div class="card" id="mtd-card">
  <h2 style="margin-bottom:12px">📅 Month to Date</h2>
  <div class="loading" id="mtd-loading">Loading...</div>
  <div class="summary" id="mtd-summary" style="display:none"></div>
  <div class="error" id="mtd-error" style="display:none"></div>
</div>

<div class="card">
  <div class="card-header">
    <h2>📊 Spend by Period</h2>
    <div class="dropdown-group">
      <span class="fx-info" data-tip="Exchange rates refresh every 24h from api.frankfurter.app">?</span>
      <span class="dropdown-label">💴 Currency</span>
      <select class="time-select" id="currency">
      <option value="usd">$ USD</option>
      <option value="eur">€ EUR</option>
      <option value="cny">¥ CNY</option>
    </select>
      <span style="color:var(--border)">|</span>
      <span class="dropdown-label">⌛ Period</span>
      <select class="time-select" id="time-range">
      <option value="1h">1 hour</option>
      <option value="3h">3 hours</option>
      <option value="12h">12 hours</option>
      <option value="24h">24 hours</option>
      <option value="7d" selected>1 week</option>
      <option value="30d">1 month</option>
    </select>
    </div>
  </div>
  <div class="period-summary" id="period-summary" style="display:none"></div>
  <div class="chart-legend" id="by-period-legend" style="display:none">
    <div class="chart-legend-item"><div class="chart-legend-swatch" style="background:var(--accent)"></div> Cache miss</div>
    <div class="chart-legend-item"><div class="chart-legend-swatch" style="background:var(--accent); opacity:0.35"></div> Cache hit</div>
  </div>
  <div class="chart-box"><canvas id="chart-by-day"></canvas></div>
  <div class="stats-row">
    <div class="retention-info">
      <span class="icon">?</span>
      <span class="tooltip" id="retention-tooltip">Loading...</span>
    </div>
  </div>
</div>

<div class="card">
  <div class="charts">
    <div>
      <h2>🤖 Spend by Model</h2>
      <div class="chart-box"><canvas id="chart-by-model"></canvas></div>
    </div>
    <div>
      <h2>🏢 Spend by Provider</h2>
      <div class="chart-box"><canvas id="chart-by-provider"></canvas></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h2>🧩 Sessions</h2>
    <div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-muted)">
      <span id="sessions-stats"></span>
      <span class="sessions-info" data-tip="Individual sessions shown for periods up to 1 week. Longer periods show session averages. List truncated to 100 most recent sessions.">?</span>
    </div>
  </div>
  <div class="loading" id="sessions-loading">Loading...</div>
  <table style="display:none" id="sessions-table">
    <thead><tr><th>Session ID</th><th>Requests</th><th>Tokens In</th><th>Tokens Out</th><th class="money-label">Est. USD</th><th>Last Seen</th></tr></thead>
    <tbody id="sessions-body"></tbody>
  </table>
  <div class="error" id="sessions-error" style="display:none"></div>
</div>

<script src="/static/chart.umd.min.js"></script>
<script>
const fmtNum = (n) => n.toLocaleString();
const fmtUSD = (n) => Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtLocale = () => {
  const cur = getCurrency();
  if (cur === 'eur') return 'de-DE';
  if (cur === 'cny') return 'zh-CN';
  return 'en-US';
};

// --- Currency ---
let eurRate = null; // null = loading, 0 = failed
let cnyRate = null;

async function fetchExchangeRate() {
  // Check cached rate in localStorage (24h TTL)
  const cached = localStorage.getItem('discursive_fx_rates');
  if (cached) {
    const entry = JSON.parse(cached);
    if (Date.now() - entry.ts < 24 * 3600 * 1000) {
      eurRate = entry.eur;
      cnyRate = entry.cny;
      return;
    }
  }
  try {
    const r = await fetch('/api/exchange-rate');
    if (!r.ok) { eurRate = 0; cnyRate = 0; return; }
    const j = await r.json();
    eurRate = j.rates.EUR;
    cnyRate = j.rates.CNY;
    localStorage.setItem('discursive_fx_rates', JSON.stringify({ eur: eurRate, cny: cnyRate, ts: Date.now() }));
  } catch {
    eurRate = 0;
    cnyRate = 0;
  }
}

function getCurrency() {
  return localStorage.getItem('discursive_currency') || 'usd';
}
function saveCurrency(val) {
  localStorage.setItem('discursive_currency', val);
}

function fmtMoney(n) {
  const val = Number(n);
  const cur = getCurrency();
  if (cur === 'eur' && eurRate > 0) {
    return (val * eurRate).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
  }
  if (cur === 'cny' && cnyRate > 0) {
    return (val * cnyRate).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ¥';
  }
  return '$' + val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function moneySymbol() {
  const cur = getCurrency();
  if (cur === 'eur' && eurRate > 0) return '€';
  if (cur === 'cny' && cnyRate > 0) return '¥';
  return '$';
}

function moneyLabel() {
  const cur = getCurrency();
  let text;
  if (cur === 'eur' && eurRate > 0) text = 'Est. EUR';
  else if (cur === 'cny' && cnyRate > 0) text = 'Est. CNY';
  else text = 'Est. USD';
  return text + ' <span class="health-info" style="margin-left:4px" data-tip="Pricing is based on best estimates. Rates may have changed — check the provider\'s site for up-to-date pricing.">?</span>';
}

function updateMoneyLabels() {
  document.querySelectorAll('.money-label').forEach(el => {
    el.innerHTML = moneyLabel();
  });
}

const fmtDate = (s) => {
  if (!s) return '';
  const d = new Date(s + (s.endsWith('Z') ? '' : 'Z'));
  if (isNaN(d.getTime())) return s.replace('T',' ').substring(0,16);
  return d.toLocaleString(fmtLocale(), { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
};

const fmtDateShort = (s) => {
  if (!s) return '';
  const d = new Date(s + (s.endsWith('Z') ? '' : 'Z'));
  if (isNaN(d.getTime())) return s.replace('T',' ').substring(0,16);
  return d.toLocaleString(fmtLocale(), { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
};
const fmtUptime = (s) => {
  if (!s || s < 0) return '—';
  const mo = Math.floor(s / 2592000), wk = Math.floor((s % 2592000) / 604800);
  const d = Math.floor((s % 604800) / 86400), h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60), ss = Math.floor(s % 60);
  const pad = n => String(n).padStart(2, '0');
  const parts = [];
  if (mo > 0) parts.push(mo + 'mo');
  if (wk > 0) parts.push(wk + 'w');
  if (d > 0) parts.push(d + 'd');
  if (h > 0) parts.push(h + 'h');
  parts.push(pad(m) + ':' + pad(ss));
  return parts.join(' ');
};
const fmtStartedAt = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  return d.toLocaleString(fmtLocale(), { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
};
const PROVIDER_COLORS = { moonshot: '#7c3aed', deepseek: '#2563eb', thaura: '#059669' };
const PROVIDER_LIGHT = { moonshot: '#a78bfa', deepseek: '#60a5fa', thaura: '#34d399' };
function providerColor(p) { return PROVIDER_COLORS[p] || '#8b949e'; }
function providerLight(p) { return PROVIDER_LIGHT[p] || '#c9d1d9'; }
function providerClass(p) { return PROVIDER_COLORS[p] ? p : 'deepseek'; }

// Vertical gradient from color at top to light variant at bottom
function makeGradient(ctx, color) {
  const g = ctx.createLinearGradient(0, 0, 0, 260);
  g.addColorStop(0, color);
  // blend to ~30% opacity at bottom for a pleasant fade
  g.addColorStop(1, color + '4D');
  return g;
}

// Provider logo URL map
const LOGO_URLS = {
  moonshot: '/static/moonshot.svg',
  deepseek: '/static/deepseek.svg',
  thaura: '/static/thaura.png',
};

// Shared tooltip: shows cache hit & miss for the whole stacked bar with %.
// getProvider(i) returns the provider key for the i-th bar, or null for no logo.
// showModelName: if true, show the model name label text as title; if false, only logo.
function makeCacheTooltip(getProvider, showModelName) {
  return {
    mode: 'index',
    intersect: false,
    enabled: false,
    external: function(context) {
      const { chart, tooltip } = context;
      if (tooltip.opacity === 0) {
        const el = document.getElementById('custom-tooltip');
        if (el) el.style.display = 'none';
        return;
      }

      const i = tooltip.dataPoints[0].dataIndex;
      const ds = chart.data.datasets;
      const missVal = ds[0].data[i];
      const hitVal  = ds[1].data[i];
      const total = +hitVal + +missVal;
      const hitPct = total > 0 ? (+hitVal / total * 100).toFixed(0) : 0;
      const missPct = total > 0 ? (+missVal / total * 100).toFixed(0) : 0;

      const label = tooltip.dataPoints[0].label;

      // Build tooltip HTML
      let html = '';

      // Provider logo row
      if (getProvider && !showModelName) {
        // By-provider: only show logo
        const p = getProvider(i);
        const logoSrc = LOGO_URLS[p] || '';
        html += '<div class="tt-logo-row"><div style="width:160px;height:66px"><img src="' + logoSrc + '" style="width:160px;height:66px;object-fit:contain" alt="' + (p || '') + '"></div></div>';
      } else if (getProvider && showModelName) {
        // By-model: show model name + logo below
        const p = getProvider(i);
        const logoSrc = LOGO_URLS[p] || '';
        const pName = p ? p.charAt(0).toUpperCase() + p.slice(1) : '';
        html += '<div class="tt-title">' + escapeHtml(label) + '</div>';
        html += '<div class="tt-logo-row"><div style="width:160px;height:66px"><img src="' + logoSrc + '" style="width:160px;height:66px;object-fit:contain" alt="' + (p || '') + '"></div></div>';
      } else {
        // Spend by period: just the label
        html += '<div class="tt-title">' + escapeHtml(label) + '</div>';
      }

      html += '<div class="tt-row">Cache miss: ' + fmtMoney(+missVal) + ' / ' + missPct + '%</div>';
      html += '<div class="tt-row">Cache hit:  ' + fmtMoney(+hitVal) + ' / ' + hitPct + '%</div>';
      html += '<div class="tt-row tt-total">Total:      ' + fmtMoney(total) + '</div>';

      // Position and show
      let el = document.getElementById('custom-tooltip');
      if (!el) {
        el = document.createElement('div');
        el.id = 'custom-tooltip';
        document.body.appendChild(el);
      }
      const rect = chart.canvas.getBoundingClientRect();
      el.innerHTML = html;
      el.style.display = 'block';
      el.style.position = 'fixed';
      el.style.left = (rect.left + tooltip.caretX + 10) + 'px';
      el.style.top = (rect.top + tooltip.caretY - 10) + 'px';
    },
  };
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// Provider pricing URLs
const PRICING_URLS = {
  moonshot: 'https://platform.kimi.ai/docs/pricing',
  deepseek: 'https://api-docs.deepseek.com/quick_start/pricing',
  thaura: 'https://thaura.ai/pricing'
};

// Pricing per 1M tokens in USD (source: usage.mdc rules)
// { model: { cache_hit: price, input: price, output: price } }
// Thaura has no cache tier.
const PRICING = {
  moonshot: {
    'kimi-k3':   { cache_hit: 0.30, input: 3.00, output: 15.00 },
    'kimi-k2.6': { cache_hit: 0.16, input: 0.95, output: 4.00 },
  },
  deepseek: {
    'deepseek-v4-flash': { cache_hit: 0.0028, input: 0.14, output: 0.28 },
    'deepseek-v4-pro':   { cache_hit: 0.003625, input: 0.435, output: 0.87 },
  },
  thaura: {
    'thaura': { input: 0.50, output: 2.00 },
  }
};

function pricingTooltip(provider) {
  const models = PRICING[provider];
  if (!models) return '';
  let lines = [];
  for (const [model, p] of Object.entries(models)) {
    let row = '<strong>' + escapeHtml(model) + '</strong><br>';
    if (p.cache_hit !== undefined) row += 'Cache hit: ' + fmtMoneyUSD(p.cache_hit) + '/MTok<br>';
    row += 'Input: ' + fmtMoneyUSD(p.input) + '/MTok<br>';
    row += 'Output: ' + fmtMoneyUSD(p.output) + '/MTok';
    lines.push(row);
  }
  let html = lines.join('<br><br>');
  html += '<br><br><em style="font-size:0.65rem;color:var(--text-muted);">Pricing may be outdated — click for site</em>';
  return html;
}

// fmtMoneyUSD always uses USD (tooltip always shows original USD prices)
function fmtMoneyUSD(n) {
  const val = Number(n);
  if (val < 0.01) return '$' + val.toFixed(4);
  return '$' + val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// --- localStorage for time range ---
const LS_KEY = 'discursive_usageui_time_range';
function getSavedRange() {
  return localStorage.getItem(LS_KEY) || '7d';
}
function saveRange(val) {
  localStorage.setItem(LS_KEY, val);
}

// Time range resolution
function timeRangeToSince(val) {
  const now = new Date();
  const map = {
    '1h': 60*60*1000,
    '3h': 3*60*60*1000,
    '12h': 12*60*60*1000,
    '24h': 24*60*60*1000,
    '7d': 7*24*60*60*1000,
    '30d': 30*24*60*60*1000
  };
  const ms = map[val] || 7*24*60*60*1000;
  return new Date(now.getTime() - ms).toISOString();
}

// Common fetch wrapper
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

let gatewayKeyVisible = false;
function toggleGatewayKey() {
  const txt = document.getElementById('gw-key-text');
  const btn = document.getElementById('gw-key-toggle');
  const grid = document.getElementById('health-grid');
  const raw = grid.dataset.gatewayKey;
  gatewayKeyVisible = !gatewayKeyVisible;
  if (gatewayKeyVisible) {
    txt.classList.remove('gw-key-blur');
    txt.title = raw;
    btn.textContent = 'Hide Key';
  } else {
    txt.classList.add('gw-key-blur');
    txt.removeAttribute('title');
    btn.textContent = 'Show Key';
  }
}
function copyToClipboard(ev, text) {
  if (!text) return;
  const btn = ev.target;
  const orig = btn.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied-flash');
    btn.textContent = '✅ Copied!';
    setTimeout(() => {
      btn.classList.remove('copied-flash');
      btn.textContent = orig;
    }, 1500);
  }).catch(() => {});
}
function copyGatewayKey() {
  const grid = document.getElementById('health-grid');
  const raw = grid.dataset.gatewayKey;
  copyToClipboard(event, raw);
}

// --- Spend by Period (was By Day) ---
async function loadByDay() {
  try {
    const range = getSavedRange();
    const since = timeRangeToSince(range);
    const bucket = timeRangeToBucket(range);
    const days = await api('/api/by-day?since=' + encodeURIComponent(since) + '&bucket=' + bucket);

    // Populate period summary stats
    const psum = document.getElementById('period-summary');
    if (days.length === 0) {
      psum.style.display = 'none';
    } else {
      const reqs = days.reduce((a, d) => a + d.request_count, 0);
      const tIn  = days.reduce((a, d) => a + d.tokens_in, 0);
      const tOut = days.reduce((a, d) => a + d.tokens_out, 0);
      const tHit = days.reduce((a, d) => a + d.cache_hit_tokens, 0);
      const tCost = days.reduce((a, d) => a + d.est_usd, 0);
      psum.style.display = 'grid';
      psum.innerHTML =
        '<div class="stat"><div class="label">Requests</div><div class="value">'+fmtNum(reqs)+'</div></div>'+
        '<div class="stat"><div class="label">Tokens In</div><div class="value">'+(tIn >= 1e6 ? (tIn/1e6).toFixed(2)+'M' : fmtNum(tIn))+'</div></div>'+
        '<div class="stat"><div class="label">Tokens Out</div><div class="value">'+(tOut >= 1e6 ? (tOut/1e6).toFixed(2)+'M' : fmtNum(tOut))+'</div></div>'+
        '<div class="stat"><div class="label">Cache Hits</div><div class="value">'+(tHit >= 1e6 ? (tHit/1e6).toFixed(2)+'M' : fmtNum(tHit))+'</div></div>'+
        '<div class="stat"><div class="label">' + moneyLabel() + '</div><div class="value">' + fmtMoney(tCost) + '</div></div>';
    }

    const labels = days.map(d => fmtDateShort(d.date));
    const cashMiss = days.map(d => Number((d.est_usd * (d.cache_miss_tokens + d.cache_hit_tokens) === 0 ? d.est_usd : d.est_usd * d.cache_miss_tokens / Math.max(1, d.cache_miss_tokens + d.cache_hit_tokens))));

    // Approximate cache-hit vs cache-miss cost split using token ratio
    const totalCash = days.map(d => d.est_usd);
    const cashHit = days.map(d => {
      const total = d.cache_miss_tokens + d.cache_hit_tokens;
      if (total === 0) return 0;
      return d.est_usd * (d.cache_hit_tokens / total);
    });

    // Cleaner approach: use separate cost approximations.
    // cache_miss = prompt - cache_hit cost; cache_hit cost from cache tokens / 1M * cache rate
    // Actually, the backend already stores per-event est_usd.
    // For the UI we approximate: if we have cache_hit/cache_miss, the spend breakdown is proportional,
    // but better: the data doesn't have cache cost broken out per-day.
    // Let's just show the cashHit/cashMiss approximation.
    const missData = days.map(d => {
      const denom = d.cache_miss_tokens + d.cache_hit_tokens;
      if (denom === 0) return d.est_usd;
      // cache_miss accounts for the "regular input" portion.
      // We approximate as: missTokens/(missTokens+hitTokens) of the est_usd
      return Number((d.est_usd * d.cache_miss_tokens / denom).toFixed(6));
    });
    const hitData = days.map(d => {
      const denom = d.cache_miss_tokens + d.cache_hit_tokens;
      if (denom === 0) return 0;
      return Number((d.est_usd * d.cache_hit_tokens / denom).toFixed(6));
    });

    if (chartByDay) chartByDay.destroy();
    chartByDay = new Chart(document.getElementById('chart-by-day'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Cache miss', data: missData, backgroundColor: '#58a6ff', borderRadius: 4 },
          { label: 'Cache hit',  data: hitData,  backgroundColor: 'rgba(88,166,255,0.35)', borderRadius: 0 },
        ]
      },
      options: {
        animation: _firstLoad ? undefined : false,
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: makeCacheTooltip(null),
        },
        scales: {
          x: {
            stacked: true,
            ticks: { color: '#8b949e', maxTicksLimit: 14 }
          },
          y: {
            stacked: true,
            ticks: { color: '#8b949e', callback: v => fmtMoney(v), padding: 4 },
            afterFit(axis) { axis.width = Math.max(axis.width, 78); }
          }
        }
      }
    });
    document.getElementById('by-period-legend').style.display = 'flex';
  } catch(e) { /* chart stays empty */ }
}

    const models = await api('/api/by-model?since=' + encodeURIComponent(since));
    const modelLabels = models.map(m => m.provider+' / '+m.model);
    const modelColors = models.map(m => providerColor(m.provider));

      return Number((m.est_usd * m.cache_miss_tokens / denom).toFixed(6));

// --- Sessions ---
async function loadSessions() {
  try {
    const range = getSavedRange();
    const since = timeRangeToSince(range);
    const sessions = await api('/api/sessions?since=' + encodeURIComponent(since));
    document.getElementById('sessions-loading').style.display = 'none';

    // Stats row
    document.getElementById('sessions-stats').textContent = sessions.length + ' session' + (sessions.length !== 1 ? 's' : '');

    const body = document.getElementById('sessions-body');
    body.innerHTML = '';

    // For time ranges longer than a week, aggregate sessions into averages
    const isLongRange = ['30d'].includes(range);

    if (isLongRange && sessions.length > 0) {
      // Compute averages across all sessions
      const count = sessions.length;
      const avgReqs = Math.round(sessions.reduce((s,x) => s + x.request_count, 0) / count);
      const avgIn = Math.round(sessions.reduce((s,x) => s + x.tokens_in, 0) / count);
      const avgOut = Math.round(sessions.reduce((s,x) => s + x.tokens_out, 0) / count);
      const avgUSD = Number((sessions.reduce((s,x) => s + x.est_usd, 0) / count).toFixed(6));

      const tr = document.createElement('tr');
      tr.className = 'session-row';
      tr.innerHTML =
        '<td><em style="color:var(--text-muted)">Average of ' + count + ' sessions</em></td>'+
        '<td class="num">'+fmtNum(avgReqs)+'</td>'+
        '<td class="num">'+fmtNum(avgIn)+'</td>'+
        '<td class="num">'+fmtNum(avgOut)+'</td>'+
        '<td class="usd">' + fmtMoney(avgUSD) + '</td>'+
        '<td>—</td>';
      body.appendChild(tr);
    } else {
      const shown = sessions.slice(0, 100);
      for (const s of shown) {
        const tr = document.createElement('tr');
        tr.className = 'session-row';
        tr.style.cursor = 'pointer';
        tr.onclick = () => showSessionModal(s.session_id);
        tr.innerHTML =
          '<td><code>'+s.session_id.substring(0,16)+'...</code></td>'+
          '<td class="num">'+fmtNum(s.request_count)+'</td>'+
          '<td class="num">'+fmtNum(s.tokens_in)+'</td>'+
          '<td class="num">'+fmtNum(s.tokens_out)+'</td>'+
          '<td class="usd">' + fmtMoney(s.est_usd) + '</td>'+
          '<td>'+fmtDate(s.last_seen)+'</td>';
        body.appendChild(tr);
      }
    }
    document.getElementById('sessions-table').style.display = sessions.length ? 'table' : 'none';
  } catch(e) {
    document.getElementById('sessions-loading').style.display = 'none';
    document.getElementById('sessions-error').style.display = 'block';
    document.getElementById('sessions-error').textContent = 'Error: ' + e.message;
  }
}

// --- Session detail modal ---
async function showSessionModal(sessionId) {
  // Remove any existing modal
  const old = document.getElementById('session-modal-overlay');
  if (old) old.remove();

  // Create overlay
  const overlay = document.createElement('div');
  overlay.id = 'session-modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;max-width:640px;width:90%;max-height:80vh;overflow-y:auto;';
  box.innerHTML = '<h2 style="margin-bottom:16px">Session Detail</h2><div style="color:var(--text-muted)">Loading...</div>';
  overlay.appendChild(box);

  // Close on overlay click
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  // Close on Escape
  const escHandler = (e) => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); } };
  document.addEventListener('keydown', escHandler);
  overlay.addEventListener('remove', () => document.removeEventListener('keydown', escHandler), { once: true });

  document.body.appendChild(overlay);

  try {
    const s = await api('/api/sessions?session_id=' + encodeURIComponent(sessionId));
    box.innerHTML =
      '<h2 style="margin-bottom:4px">Session</h2>' +
      '<code style="font-size:0.72rem;color:var(--text-muted);display:block;margin-bottom:16px;word-break:break-all">' + escapeHtml(sessionId) + '</code>' +
      '<div class="summary" style="margin-bottom:16px">' +
        '<div class="stat"><div class="label">Requests</div><div class="value">'+fmtNum(s.request_count)+'</div></div>' +
        '<div class="stat"><div class="label">Tokens In</div><div class="value">'+fmtNum(s.tokens_in)+'</div></div>' +
        '<div class="stat"><div class="label">Tokens Out</div><div class="value">'+fmtNum(s.tokens_out)+'</div></div>' +
        '<div class="stat"><div class="label">' + moneyLabel() + '</div><div class="value">' + fmtMoney(s.est_usd) + '</div></div>' +
      '</div>' +
      '<table id="modal-detail-table">' +
        '<thead><tr><th>Model</th><th>Provider</th><th>Requests</th><th>Tokens In</th><th>Tokens Out</th><th class="money-label">' + moneyLabel() + '</th></tr></thead>' +
        '<tbody id="modal-detail-body"></tbody>' +
      '</table>' +
      '<button id="modal-close-btn" style="margin-top:16px;padding:6px 16px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer">Close</button>';

    box.querySelector('#modal-close-btn').addEventListener('click', () => overlay.remove());

    const body = box.querySelector('#modal-detail-body');
    for (const m of (s.by_model||[])) {
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td>'+escapeHtml(m.model)+'</td><td class="'+providerClass(m.provider)+'">'+escapeHtml(m.provider)+'</td>'+
        '<td class="num">'+fmtNum(m.request_count)+'</td>'+
        '<td class="num">'+fmtNum(m.tokens_in)+'</td>'+
        '<td class="num">'+fmtNum(m.tokens_out)+'</td>'+
        '<td class="usd">' + fmtMoney(m.est_usd) + '</td>';
      body.appendChild(tr);
    }
  } catch(e) {
    box.innerHTML = '<h2 style="margin-bottom:16px">Session Detail</h2><div style="color:#f85149">Error: ' + escapeHtml(e.message) + '</div><button id="modal-close-btn" style="margin-top:16px;padding:6px 16px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer">Close</button>';
    box.querySelector('#modal-close-btn').addEventListener('click', () => overlay.remove());
  }
}

// --- Reload all time-sensitive data when range changes ---
function reloadGraphs() {
  loadByDay();
  loadByModel();
  loadByProvider();
  loadSessions();
}

// --- Auto-refresh polling (paused when tab is hidden) ---
let _pollTimer = null;
let _uptimeBase = 0;       // server-reported uptime at last sync
let _uptimeLastSync = 0;   // Date.now() when we last synced
let _uptimeInterval = null; // 1-second ticker

function updateUptimeDisplay() {
  const elapsed = Math.floor((Date.now() - _uptimeLastSync) / 1000);
  const total = _uptimeBase + elapsed;
  const el = document.getElementById('uptime-display');
  if (el) el.textContent = fmtUptime(total);
}

function syncUptime(seconds) {
  _uptimeBase = seconds;
  _uptimeLastSync = Date.now();
  updateUptimeDisplay();
}

function startUptimeTicker() {
  if (_uptimeInterval) clearInterval(_uptimeInterval);
  _uptimeInterval = setInterval(updateUptimeDisplay, 1000);
}

function stopUptimeTicker() {
  if (_uptimeInterval) { clearInterval(_uptimeInterval); _uptimeInterval = null; }
}
function startPolling() {
  stopPolling();
  _pollTimer = setInterval(refreshAll, 15000);
}
function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}
function refreshAll() {
  loadHealth();
  loadMTD();
  reloadGraphs();
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { stopPolling(); stopUptimeTicker(); }
  else { refreshAll(); startPolling(); startUptimeTicker(); }
});

// --- Init ---
document.addEventListener('DOMContentLoaded', async () => {
  const sel = document.getElementById('time-range');
  sel.value = getSavedRange();
  sel.addEventListener('change', () => {
    saveRange(sel.value);
    reloadGraphs();
  });

  // Preload exchange rates before first render so currency switcher is instant
  await fetchExchangeRate();

  const curSel = document.getElementById('currency');
  curSel.value = getCurrency();
  curSel.addEventListener('change', () => {
    saveCurrency(curSel.value);
    updateMoneyLabels();
    loadHealth();   // re-render started-at in new locale
    reloadGraphs();
    loadMTD();
    loadSessions();
  });

  updateMoneyLabels();
  loadHealth();
  loadMTD();
  reloadGraphs();
  loadStats();
  _firstLoad = false; // subsequent chart updates skip animation

  // Start 15-second auto-refresh (paused when tab is hidden)
  startPolling();
  startUptimeTicker();
});
</script>
