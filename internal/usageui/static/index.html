<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discursive Usage</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --danger: #f85149;
  --warn: #d29922;
  --moonshot: #f78166;
  --deepseek: #79c0ff;
  --thaura: #d2a8ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 24px; max-width: 1100px; margin: 0 auto; }
.header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.header img { height: 32px; width: auto; }
.header .providers { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.header .provider-indicator { display: flex; align-items: center; gap: 6px; opacity: 0.4; transition: opacity 0.2s; }
.header .provider-indicator.enabled { opacity: 1; }
.header .provider-indicator img { height: 22px; width: auto; }
.header .provider-indicator .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
h2 { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 12px; font-weight: 500; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; }
.stat { text-align: center; }
.stat .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.stat .value { font-size: 1.6rem; font-weight: 600; margin-top: 4px; }
.stat .sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
.charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; }
.chart-box { height: 260px; position: relative; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
th { color: var(--text-muted); font-weight: 500; }
td { color: var(--text); }
tr:hover td { background: rgba(255,255,255,0.02); }
.session-row { cursor: pointer; }
.session-row:hover td { background: rgba(88,166,255,0.05); }
.health-grid { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 0; }
.health-col { padding: 12px 12px; border-bottom: 1px solid var(--border); }
.health-col:nth-child(n+4) { border-bottom: none; }
.health-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.health-val { font-size: 0.85rem; color: var(--text); word-break: break-all; }
.health-btn { font-size: 0.72rem; padding: 3px 12px; border-radius: 5px; border: 1px solid var(--border); background: rgba(48,54,61,0.6); color: var(--text-muted); cursor: pointer; white-space: nowrap; font-weight: 500; letter-spacing: 0.2px; transition: all 0.15s; }
.health-btn:hover { background: rgba(88,166,255,0.12); border-color: rgba(88,166,255,0.3); color: var(--accent); }
.health-btn:active { background: rgba(88,166,255,0.18); }
.health-btn.copy-btn { color: var(--accent2); border-color: rgba(63,185,80,0.25); background: rgba(63,185,80,0.08); }
.health-btn.copy-btn:hover { background: rgba(63,185,80,0.16); border-color: rgba(63,185,80,0.45); }
.health-btn.copied-flash { color: var(--accent2) !important; border-color: var(--accent2) !important; background: rgba(63,185,80,0.2) !important; }
.gw-key-blur { color: transparent; text-shadow: 0 0 6px var(--text-muted); user-select: none; cursor: default; }
.gw-key-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.dot-ok { background: var(--accent2); }
.dot-warn { background: var(--warn); }
.dot-err { background: var(--danger); }
.loading { color: var(--text-muted); padding: 40px; text-align: center; }
.error { color: #f85149; padding: 16px; }
.moonshot { color: var(--moonshot); }
.deepseek { color: var(--deepseek); }
.thaura { color: var(--thaura); }
.usd { font-variant-numeric: tabular-nums; text-align: right !important; }
.num { font-variant-numeric: tabular-nums; text-align: right !important; }
</style>
</head>
<body>
<div class="header">
  <img src="/static/discursive.png" alt="Discursive">
  <div class="providers" id="provider-indicators"></div>
</div>

<div class="card" id="health-card">
  <h2>💚 System Health</h2>
  <div class="loading" id="health-loading">Loading...</div>
  <div class="health-grid" id="health-grid" style="display:none"></div>
  <div class="error" id="health-error" style="display:none"></div>
</div>

<div class="card" id="mtd-card">
  <h2>📅 Month to Date</h2>
  <div class="loading" id="mtd-loading">Loading...</div>
  <div class="summary" id="mtd-summary" style="display:none"></div>
  <div class="error" id="mtd-error" style="display:none"></div>
</div>

<div class="card">
  <h2>📊 Spend by Day</h2>
  <div class="chart-box"><canvas id="chart-by-day"></canvas></div>
</div>

<div class="card">
  <div class="charts">
    <div><h2>🤖 Spend by Model</h2><div class="chart-box"><canvas id="chart-by-model"></canvas></div></div>
    <div><h2>🏢 Spend by Provider</h2><div class="chart-box"><canvas id="chart-by-provider"></canvas></div></div>
  </div>
</div>

<div class="card">
  <h2>🧩 Sessions</h2>
  <div class="loading" id="sessions-loading">Loading...</div>
  <table style="display:none" id="sessions-table">
    <thead><tr><th>Session ID</th><th>Requests</th><th>Tokens In</th><th>Tokens Out</th><th>Est. USD</th><th>Last Seen</th></tr></thead>
    <tbody id="sessions-body"></tbody>
  </table>
  <div class="error" id="sessions-error" style="display:none"></div>
</div>

<div class="card" id="detail-card" style="display:none">
  <h2 id="detail-title">Session Detail</h2>
  <div class="loading" id="detail-loading">Loading...</div>
  <div class="summary" id="detail-summary" style="display:none"></div>
  <table style="display:none" id="detail-table" class="mt-3">
    <thead><tr><th>Model</th><th>Provider</th><th>Requests</th><th>Tokens In</th><th>Tokens Out</th><th>Est. USD</th></tr></thead>
    <tbody id="detail-body"></tbody>
  </table>
  <div class="error" id="detail-error" style="display:none"></div>
</div>

<script src="/static/chart.umd.min.js"></script>
<script>
const fmtNum = (n) => n.toLocaleString();
const fmtUSD = (n) => Number(n).toLocaleString(undefined, { minimumFractionDigits: 3, maximumFractionDigits: 3 });
const fmtDate = (s) => s ? s.replace('T',' ').substring(0,16) : '';
const fmtUptime = (s) => {
  if (!s || s < 0) return '—';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
};
const PROVIDER_COLORS = { moonshot: '#f78166', deepseek: '#79c0ff', thaura: '#d2a8ff' };
function providerColor(p) { return PROVIDER_COLORS[p] || '#8b949e'; }
function providerClass(p) { return PROVIDER_COLORS[p] ? p : 'deepseek'; }

let curChart = null, modelChart = null, provChart = null;

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

// Health
async function loadHealth() {
  try {
    const h = await api('/api/health');
    document.getElementById('health-loading').style.display = 'none';
    const grid = document.getElementById('health-grid');
    grid.style.display = 'grid';

    const raw = h.gateway_key || '';
    const up = fmtUptime(h.uptime_seconds);

    grid.innerHTML =
      '<div class="health-col">' +
        '<div class="health-label">⚙️ Gateway</div>' +
        '<div class="health-val">PID ' + h.pid + '</div>' +
      '</div>' +
      '<div class="health-col health-col-wide">' +
        '<div class="health-label">☁️ Tunnel</div>' +
        '<div class="health-val" style="display:flex;align-items:center;gap:8px;word-break:normal;">' +
          '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;">' + (h.public_url || '—') + '</span>' +
          (h.public_url ? '<button class="health-btn copy-btn" onclick="copyToClipboard(event, \'' + h.public_url + '\')">Copy URL</button>' : '') +
        '</div>' +
      '</div>' +
      '<div class="health-col">' +
        '<div class="health-label">🏷️ Version</div>' +
        '<div class="health-val">' + h.version + '</div>' +
      '</div>' +
      '<div class="health-col">' +
        '<div class="health-label">🔌 Port</div>' +
        '<div class="health-val">' + String(h.local_port) + '</div>' +
      '</div>' +
      '<div class="health-col health-col-wide">' +
        '<div class="health-label">🔐 Gateway Key</div>' +
        '<div class="health-val" style="display:flex;align-items:center;gap:8px;word-break:normal;">' +
          '<span id="gw-key-text" class="gw-key-text gw-key-blur">' + raw + '</span>' +
            '<button class="health-btn" onclick="toggleGatewayKey()" id="gw-key-toggle">Show Key</button>' +
            '<button class="health-btn copy-btn" onclick="copyGatewayKey()">Copy Key</button>' +
        '</div>' +
      '</div>' +
      '<div class="health-col">' +
        '<div class="health-label">⏱️ Uptime</div>' +
        '<div class="health-val">' + up + '</div>' +
      '</div>';

    // Store gateway key for toggle/copy
    grid.dataset.gatewayKey = raw;

    // Provider indicator dots in header
    const providers = document.getElementById('provider-indicators');
    const provData = [
      { id: 'moonshot', name: 'Moonshot',  logo: '/static/moonshot.svg', ok: h.has_moonshot_key },
      { id: 'deepseek', name: 'DeepSeek',  logo: '/static/deepseek.svg', ok: h.has_deepseek_key },
      { id: 'thaura',   name: 'Thaura',    logo: '/static/thaura.png',   ok: h.has_thaura_key },
    ];
    providers.innerHTML = provData.map(p =>
      '<div class="provider-indicator' + (p.ok ? ' enabled' : '') + '" title="' + p.name + ': ' + (p.ok ? 'Configured' : 'Not configured') + '">' +
        '<div class="dot ' + (p.ok ? 'dot-ok' : 'dot-err') + '"></div>' +
        '<img src="' + p.logo + '" alt="' + p.name + '" />' +
      '</div>'
    ).join('');

  } catch(e) {
    document.getElementById('health-loading').style.display = 'none';
    document.getElementById('health-error').style.display = 'block';
    document.getElementById('health-error').textContent = 'Error: ' + e.message;
  }
}

let gatewayKeyVisible = false;
function toggleGatewayKey() {
  const txt = document.getElementById('gw-key-text');
  const btn = document.getElementById('gw-key-toggle');
  const grid = document.getElementById('health-grid');
  const raw = grid.dataset.gatewayKey;
  gatewayKeyVisible = !gatewayKeyVisible;
  if (gatewayKeyVisible) {
    txt.classList.remove('gw-key-blur');
    txt.title = raw;
    btn.textContent = 'Hide Key';
  } else {
    txt.classList.add('gw-key-blur');
    txt.removeAttribute('title');
    btn.textContent = 'Show Key';
  }
}
function copyToClipboard(ev, text) {
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = ev.target;
    btn.classList.add('copied-flash');
    setTimeout(() => btn.classList.remove('copied-flash'), 1200);
  }).catch(() => {});
}
function copyGatewayKey() {
  const grid = document.getElementById('health-grid');
  const raw = grid.dataset.gatewayKey;
  copyToClipboard(event, raw);
}

// MTD summary
async function loadMTD() {
  try {
    const s = await api('/api/summary');
    document.getElementById('mtd-loading').style.display = 'none';
    const div = document.getElementById('mtd-summary');
    div.style.display = 'grid';
    div.innerHTML =
      '<div class="stat"><div class="label">Requests</div><div class="value">'+fmtNum(s.request_count)+'</div></div>'+
      '<div class="stat"><div class="label">Tokens In</div><div class="value">'+(s.tokens_in >= 1e6 ? (s.tokens_in/1e6).toFixed(2)+'M' : fmtNum(s.tokens_in))+'</div></div>'+
      '<div class="stat"><div class="label">Tokens Out</div><div class="value">'+(s.tokens_out >= 1e6 ? (s.tokens_out/1e6).toFixed(2)+'M' : fmtNum(s.tokens_out))+'</div></div>'+
      '<div class="stat"><div class="label">Cache Hits</div><div class="value">'+(s.cache_hit_tokens >= 1e6 ? (s.cache_hit_tokens/1e6).toFixed(2)+'M' : fmtNum(s.cache_hit_tokens))+'</div></div>'+
      '<div class="stat"><div class="label">Est. USD</div><div class="value">$'+fmtUSD(s.est_usd)+'</div></div>';
  } catch(e) {
    document.getElementById('mtd-loading').style.display = 'none';
    document.getElementById('mtd-error').style.display = 'block';
    document.getElementById('mtd-error').textContent = 'Error: ' + e.message;
  }
}

// By day chart
async function loadByDay() {
  try {
    const days = await api('/api/by-day');
    const labels = days.map(d => d.date).reverse();
    const data = days.map(d => d.est_usd).reverse();
    curChart = new Chart(document.getElementById('chart-by-day'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Est. USD', data, backgroundColor: '#58a6ff', borderRadius: 4 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#8b949e', maxTicksLimit: 14 } },
          y: { ticks: { color: '#8b949e', callback: v => '$'+fmtUSD(v) } }
        }
      }
    });
  } catch(e) { /* chart stays empty */ }
}

// By model chart
async function loadByModel() {
  try {
    const models = await api('/api/by-model');
    const labels = models.map(m => m.provider+' / '+m.model);
    const data = models.map(m => m.est_usd);
    const colors = models.map(m => providerColor(m.provider));
    modelChart = new Chart(document.getElementById('chart-by-model'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Est. USD', data, backgroundColor: colors, borderRadius: 4 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#8b949e' } },
          y: { ticks: { color: '#8b949e', callback: v => '$'+fmtUSD(v) } }
        }
      }
    });
  } catch(e) { /* chart stays empty */ }
}

// By provider chart
async function loadByProvider() {
  try {
    const provs = await api('/api/by-provider');
    const labels = provs.map(p => p.provider);
    const data = provs.map(p => p.est_usd);
    const colors = provs.map(p => providerColor(p.provider));
    provChart = new Chart(document.getElementById('chart-by-provider'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Est. USD', data, backgroundColor: colors, borderRadius: 4 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#8b949e' } },
          y: { ticks: { color: '#8b949e', callback: v => '$'+fmtUSD(v) } }
        }
      }
    });
  } catch(e) { /* chart stays empty */ }
}

// Sessions table
async function loadSessions() {
  try {
    const sessions = await api('/api/sessions');
    document.getElementById('sessions-loading').style.display = 'none';
    const body = document.getElementById('sessions-body');
    body.innerHTML = '';
    for (const s of sessions) {
      const tr = document.createElement('tr');
      tr.className = 'session-row';
      tr.onclick = () => loadSessionDetail(s.session_id);
      tr.innerHTML =
        '<td><code>'+s.session_id.substring(0,16)+'...</code></td>'+
        '<td class="num">'+fmtNum(s.request_count)+'</td>'+
        '<td class="num">'+fmtNum(s.tokens_in)+'</td>'+
        '<td class="num">'+fmtNum(s.tokens_out)+'</td>'+
        '<td class="usd">$'+fmtUSD(s.est_usd)+'</td>'+
        '<td>'+fmtDate(s.last_seen)+'</td>';
      body.appendChild(tr);
    }
    document.getElementById('sessions-table').style.display = sessions.length ? 'table' : 'none';
  } catch(e) {
    document.getElementById('sessions-loading').style.display = 'none';
    document.getElementById('sessions-error').style.display = 'block';
    document.getElementById('sessions-error').textContent = 'Error: ' + e.message;
  }
}

// Session detail
async function loadSessionDetail(sessionId) {
  const card = document.getElementById('detail-card');
  card.style.display = 'block';
  document.getElementById('detail-title').textContent = 'Session: ' + sessionId;
  document.getElementById('detail-loading').style.display = 'block';
  document.getElementById('detail-summary').style.display = 'none';
  document.getElementById('detail-table').style.display = 'none';
  document.getElementById('detail-error').style.display = 'none';
  try {
    const s = await api('/api/sessions?session_id=' + encodeURIComponent(sessionId));
    document.getElementById('detail-loading').style.display = 'none';
    const div = document.getElementById('detail-summary');
    div.style.display = 'grid';
    div.innerHTML =
      '<div class="stat"><div class="label">Requests</div><div class="value">'+fmtNum(s.request_count)+'</div></div>'+
      '<div class="stat"><div class="label">Tokens In</div><div class="value">'+fmtNum(s.tokens_in)+'</div></div>'+
      '<div class="stat"><div class="label">Tokens Out</div><div class="value">'+fmtNum(s.tokens_out)+'</div></div>'+
      '<div class="stat"><div class="label">Est. USD</div><div class="value">$'+fmtUSD(s.est_usd)+'</div></div>';
    const body = document.getElementById('detail-body');
    body.innerHTML = '';
    for (const m of (s.by_model||[])) {
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td>'+m.model+'</td><td class="'+providerClass(m.provider)+'">'+m.provider+'</td>'+
        '<td class="num">'+fmtNum(m.request_count)+'</td>'+
        '<td class="num">'+fmtNum(m.tokens_in)+'</td>'+
        '<td class="num">'+fmtNum(m.tokens_out)+'</td>'+
        '<td class="usd">$'+fmtUSD(m.est_usd)+'</td>';
      body.appendChild(tr);
    }
    document.getElementById('detail-table').style.display = s.by_model ? 'table' : 'none';
    card.scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    document.getElementById('detail-loading').style.display = 'none';
    document.getElementById('detail-error').style.display = 'block';
    document.getElementById('detail-error').textContent = 'Error: ' + e.message;
  }
}

loadHealth(); loadMTD(); loadByDay(); loadByModel(); loadByProvider(); loadSessions();
</script>
</body>
</html>
