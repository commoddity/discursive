# GoReleaser configuration for discursive
# Triggers on: git tag push (v*) → GitHub Actions release-binaries workflow
# Produces: macOS + Linux binaries (amd64, arm64) + checksums

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: discursive
    dir: .
    main: .
    binary: discursive
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/commoddity/discursive/internal/cli.Version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: ['tar.gz']
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: commoddity
    name: discursive
